<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>EOU Plotter</title>
<style>
/* ── Themes ─────────────────────────────────────────────── */
:root[data-theme="dark"] {
  --bg-page:    #0d1117;
  --bg-panel:   #161b22;
  --bg-inset:   #0d1117;
  --bg-header:  #21262d;
  --border:     #21262d;
  --border-2:   #30363d;
  --text-pri:   #e6edf3;
  --text-sec:   #8b949e;
  --text-muted: #6e7681;
  --accent:     #58a6ff;
  --btn-bg:     #1f6feb;
  --btn-hover:  #388bfd;
  --canvas-bg:  #0d1117;
  --grid-line:  rgba(48,54,61,0.9);
  --axis-line:  #30363d;
  --center-dot: #ffffff;
  --center-ring:#0d1117;
  --td-label:   #e6edf3;
}
:root[data-theme="light"] {
  --bg-page:    #f5f6f8;
  --bg-panel:   #ffffff;
  --bg-inset:   #f0f1f3;
  --bg-header:  #e8eaed;
  --border:     #d0d7de;
  --border-2:   #c4cdd6;
  --text-pri:   #1c2128;
  --text-sec:   #57606a;
  --text-muted: #8c959f;
  --accent:     #0969da;
  --btn-bg:     #0969da;
  --btn-hover:  #0550ae;
  --canvas-bg:  #ffffff;
  --grid-line:  rgba(180,188,196,0.6);
  --axis-line:  #c4cdd6;
  --center-dot: #1c2128;
  --center-ring:#ffffff;
  --td-label:   #1c2128;
}

/* ── Reset & base ───────────────────────────────────────── */
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: 'Courier New', monospace;
  background: var(--bg-page);
  color: var(--text-pri);
  min-height: 100dvh;
  padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0)
           env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
  transition: background 0.2s, color 0.2s;
}

/* ── Topbar ─────────────────────────────────────────────── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--border);
  gap: 10px;
  flex-wrap: wrap;
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg-page);
}
h1 {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
}
.theme-toggle {
  display: flex;
  align-items: center;
  background: var(--bg-header);
  border: 1px solid var(--border-2);
  border-radius: 20px;
  padding: 3px;
  gap: 2px;
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.theme-opt {
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 5px 12px;
  border-radius: 16px;
  color: var(--text-sec);
  transition: background 0.15s, color 0.15s;
}
.theme-opt.active { background: var(--btn-bg); color: #fff; }

/* ── Main layout — panel left fixed, chart right fills ──── */
.layout {
  display: grid;
  grid-template-columns: minmax(260px, 300px) 1fr;
  gap: 20px;
  max-width: 1400px;
  margin: 0 auto;
  padding: 20px 16px;
  align-items: start;
}
/* Stack on true phones — chart on top */
@media (max-width: 640px) {
  .layout { grid-template-columns: 1fr; }
  .chart-wrap { order: -1; }
}

/* ── Panel (inputs) ─────────────────────────────────────── */
.panel {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.panel-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-sec);
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--border);
}

/* Global fields inside panel */
.panel-body { padding: 14px 16px; }
.global-field { margin-bottom: 14px; }

/* Unit row */
.unit-row { display: flex; gap: 8px; margin-bottom: 14px; }
.unit-btn {
  flex: 1;
  background: var(--bg-inset);
  border: 1px solid var(--border-2);
  border-radius: 6px;
  color: var(--text-sec);
  font-family: 'Courier New', monospace;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  padding: 10px 4px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.unit-btn.active { background: var(--btn-bg); border-color: var(--btn-bg); color: #fff; }

label {
  display: block;
  font-size: 11px;
  color: var(--text-sec);
  margin-bottom: 5px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
input[type="number"], input[type="text"], select {
  width: 100%;
  background: var(--bg-inset);
  border: 1px solid var(--border-2);
  border-radius: 6px;
  color: var(--text-pri);
  font-family: 'Courier New', monospace;
  font-size: 14px;
  padding: 10px 12px;
  margin-bottom: 12px;
  outline: none;
  transition: border-color 0.15s;
  -webkit-appearance: none;
  appearance: none;
  min-height: 44px; /* iOS tap target */
}
input[type="number"]:focus, input[type="text"]:focus, select:focus {
  border-color: var(--accent);
}
select { cursor: pointer; background-image: none; }

/* ── Collapsible tool groups ────────────────────────────── */
.field-group {
  border-top: 1px solid var(--border);
}
.field-group-header {
  background: var(--bg-header);
  padding: 12px 16px;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--text-sec);
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  justify-content: space-between;
}
.field-group-left { display: flex; align-items: center; gap: 8px; }
.chevron {
  font-size: 10px;
  color: var(--text-muted);
  transition: transform 0.2s;
  display: inline-block;
}
.field-group.open .chevron { transform: rotate(180deg); }
.color-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.field-inner {
  padding: 14px 16px;
  display: none;
}
.field-group.open .field-inner { display: block; }

/* ── Plot button ────────────────────────────────────────── */
.btn-wrap { padding: 14px 16px; border-top: 1px solid var(--border); }
.btn {
  width: 100%;
  background: var(--btn-bg);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-family: 'Courier New', monospace;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 13px;
  cursor: pointer;
  transition: background 0.15s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  min-height: 48px;
}
.btn:hover { background: var(--btn-hover); }
.btn:active { opacity: 0.85; }

/* ── Chart panel ────────────────────────────────────────── */
.chart-wrap {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  display: flex;
  flex-direction: column;
}
.chart-meta {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 12px;
  flex-wrap: wrap;
  gap: 8px;
}
.chart-main-title {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-pri);
}
.chart-sub { font-size: 10px; color: var(--text-sec); margin-top: 3px; line-height: 1.5; }
.legend { display: flex; flex-direction: column; gap: 5px; }
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 10px;
  color: var(--text-sec);
  letter-spacing: 0.03em;
}
.legend-line { width: 18px; height: 2px; border-radius: 1px; flex-shrink: 0; }
.confidence-badge {
  background: var(--bg-header);
  border: 1px solid var(--border-2);
  border-radius: 4px;
  padding: 3px 8px;
  font-size: 10px;
  letter-spacing: 0.08em;
  color: var(--text-sec);
  text-transform: uppercase;
  white-space: nowrap;
}
canvas#eouCanvas {
  width: 100%;
  display: block;
  border: 1px solid var(--border);
  border-radius: 6px;
  touch-action: none;
}
.axis-wrap { display: flex; align-items: stretch; }
.axis-y-label {
  writing-mode: vertical-rl;
  transform: rotate(180deg);
  font-size: 10px;
  color: var(--text-sec);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-right: 4px;
  text-align: center;
  flex-shrink: 0;
}
.axis-x-label {
  text-align: center;
  font-size: 10px;
  color: var(--text-sec);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-top: 6px;
}

/* ── Prevent iOS font-zoom on focus ─────────────────────── */
@media (max-width: 620px) {
  input[type="number"], input[type="text"], select { font-size: 16px; }
}
</style>
</head>
<body>

<div class="topbar">
  <h1>&#9632; Ellipse of Uncertainty</h1>
  <div class="theme-toggle" onclick="toggleTheme()" title="Switch theme">
    <div class="theme-opt active" id="optDark">Dark</div>
    <div class="theme-opt" id="optLight">Light</div>
  </div>
</div>

<div class="layout">

  <!-- ── Inputs ── -->
  <div class="panel">
    <div class="panel-title">Input Parameters</div>
    <div class="panel-body">

      <div class="global-field">
        <label>Unit System</label>
        <div class="unit-row">
          <div class="unit-btn active" id="unitM"  onclick="setUnit('m')">Metric (m)</div>
          <div class="unit-btn"        id="unitFt" onclick="setUnit('ft')">English (ft)</div>
        </div>
      </div>

      <div class="global-field">
        <label id="tdLabel">Total Depth (m)</label>
        <input type="number" id="totalDepth" value="8000" min="0" step="100" inputmode="decimal">
      </div>

      <div class="global-field">
        <label>Confidence Level</label>
        <select id="confidenceLevel">
          <option value="1.000 Sigma (1D — 68%)">1.000 Sigma (1D — 68%)</option>
          <option value="2.000 Sigma (2D — 95%)">2.000 Sigma (2D — 95%)</option>
          <option value="3.000 Sigma (3D — 99.7%)" selected>3.000 Sigma (3D — 99.7%)</option>
        </select>
      </div>
    </div>

    <!-- Tool 1 — open by default -->
    <div class="field-group open" id="grp1">
      <div class="field-group-header" onclick="toggleGroup('grp1')">
        <div class="field-group-left">
          <div class="color-dot" style="background:#58a6ff;"></div>Survey Tool 1
        </div>
        <span class="chevron">▼</span>
      </div>
      <div class="field-inner">
        <label>Tool Name</label>
        <input type="text" id="name1" value="MWD+IFR2+SAG+MS">
        <label id="lbl_major1">Semi-Major / X-axis (m)</label>
        <input type="number" id="major1" value="130" min="0" step="1" inputmode="decimal">
        <label id="lbl_minor1">Semi-Minor / Y-axis (m)</label>
        <input type="number" id="minor1" value="38" min="0" step="1" inputmode="decimal">
      </div>
    </div>

    <!-- Tool 2 — open by default -->
    <div class="field-group open" id="grp2">
      <div class="field-group-header" onclick="toggleGroup('grp2')">
        <div class="field-group-left">
          <div class="color-dot" style="background:#f78166;"></div>Survey Tool 2
        </div>
        <span class="chevron">▼</span>
      </div>
      <div class="field-inner">
        <label>Tool Name</label>
        <input type="text" id="name2" value="GYD-OmegaX">
        <label id="lbl_major2">Semi-Major / X-axis (m)</label>
        <input type="number" id="major2" value="55" min="0" step="1" inputmode="decimal">
        <label id="lbl_minor2">Semi-Minor / Y-axis (m)</label>
        <input type="number" id="minor2" value="22" min="0" step="1" inputmode="decimal">
      </div>
    </div>

    <!-- Tool 3 — collapsed by default (optional) -->
    <div class="field-group" id="grp3">
      <div class="field-group-header" onclick="toggleGroup('grp3')">
        <div class="field-group-left">
          <div class="color-dot" style="background:#3fb950;"></div>
          Survey Tool 3 <span style="font-size:10px;color:var(--text-muted);margin-left:4px;">(optional)</span>
        </div>
        <span class="chevron">▼</span>
      </div>
      <div class="field-inner">
        <label>Tool Name</label>
        <input type="text" id="name3" placeholder="Leave blank to hide">
        <label id="lbl_major3">Semi-Major / X-axis (m)</label>
        <input type="number" id="major3" placeholder="e.g. 80" min="0" step="1" inputmode="decimal">
        <label id="lbl_minor3">Semi-Minor / Y-axis (m)</label>
        <input type="number" id="minor3" placeholder="e.g. 30" min="0" step="1" inputmode="decimal">
      </div>
    </div>

    <div class="btn-wrap">
      <button class="btn" onclick="drawPlot()">&#9654; Plot Ellipses</button>
    </div>
  </div>

  <!-- ── Chart ── -->
  <div class="chart-wrap">
    <div class="chart-meta">
      <div>
        <div class="chart-main-title">Wellbore Position Uncertainty</div>
        <div class="chart-sub" id="chartSubtitle">Enter values and tap Plot</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
        <div class="confidence-badge" id="confBadge">3.000 Sigma</div>
        <div class="legend" id="legend"></div>
      </div>
    </div>
    <div class="axis-wrap">
      <div class="axis-y-label" id="yAxisLabel">Highside [m]</div>
      <div style="flex:1;display:flex;flex-direction:column;">
        <canvas id="eouCanvas"></canvas>
        <div class="axis-x-label" id="xAxisLabel">Lateral [m]</div>
      </div>
    </div>
  </div>

</div><!-- .layout -->

<script>
const COLORS     = ['#58a6ff','#f78166','#3fb950'];
const COLORS_DIM = ['rgba(88,166,255,0.13)','rgba(247,129,102,0.13)','rgba(63,185,80,0.13)'];

let currentUnit  = 'm';
let currentTheme = 'dark';

/* ─── Collapsible groups ───────────────────────────────── */
function toggleGroup(id) {
  document.getElementById(id).classList.toggle('open');
}

/* ─── Unit toggle ──────────────────────────────────────── */
function setUnit(u) {
  currentUnit = u;
  document.getElementById('unitM').classList.toggle('active', u === 'm');
  document.getElementById('unitFt').classList.toggle('active', u === 'ft');
  document.getElementById('tdLabel').textContent = `Total Depth (${u})`;
  for (let i = 1; i <= 3; i++) {
    document.getElementById('lbl_major' + i).textContent = `Semi-Major / X-axis (${u})`;
    document.getElementById('lbl_minor' + i).textContent = `Semi-Minor / Y-axis (${u})`;
  }
  document.getElementById('yAxisLabel').textContent = `Highside [${u}]`;
  document.getElementById('xAxisLabel').textContent = `Lateral [${u}]`;
  drawPlot();
}

/* ─── Theme toggle ─────────────────────────────────────── */
function toggleTheme() {
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', currentTheme);
  document.getElementById('optDark').classList.toggle('active',  currentTheme === 'dark');
  document.getElementById('optLight').classList.toggle('active', currentTheme === 'light');
  drawPlot();
}

/* ─── Axis helpers ─────────────────────────────────────── */
function niceStep(maxVal, targetDivisions) {
  const raw  = maxVal / targetDivisions;
  const mag  = Math.pow(10, Math.floor(Math.log10(raw)));
  const norm = raw / mag;
  if (norm < 1.5) return mag;
  if (norm < 3.5) return 2 * mag;
  if (norm < 7.5) return 5 * mag;
  return 10 * mag;
}
function niceMax(dataMax, step) {
  return Math.ceil(dataMax / step) * step;
}
function cssVar(name) {
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

/* ─── Responsive canvas size ────────────────────────────── */
function canvasSize(canvasEl) {
  const W = Math.max(canvasEl.parentElement.offsetWidth - 28, 200);
  // Taller ratio only when genuinely narrow (phone stacked view)
  const ratio = W < 380 ? 0.80 : 0.58;
  return { W, H: Math.round(W * ratio) };
}

/* ─── Responsive font/pad ───────────────────────────────── */
function layoutParams(W) {
  const small = W < 360;
  return {
    pad:      small ? { top:28, right:28, bottom:34, left:46 } : { top:36, right:38, bottom:42, left:62 },
    tickFont: small ? '11px Courier New' : '13px Courier New',
    labelFont:small ? '12px Courier New' : '14px Courier New',
    dotR:     small ? 4 : 5.5,
    ellW:     small ? 1.5 : 2,
  };
}

/* ─── Main draw ─────────────────────────────────────────── */
function drawPlot() {
  const td   = parseFloat(document.getElementById('totalDepth').value) || 8000;
  const conf = document.getElementById('confidenceLevel').value;
  const ul   = currentUnit;

  document.getElementById('chartSubtitle').textContent =
    'Confidence: ' + conf + '  |  TD: ' + td.toLocaleString() + ' ' + ul;
  document.getElementById('confBadge').textContent =
    conf.split(' ')[0] + ' ' + conf.split(' ')[1];

  const tools = [];
  for (let i = 1; i <= 3; i++) {
    const name  = document.getElementById('name'  + i).value.trim();
    const major = parseFloat(document.getElementById('major' + i).value);
    const minor = parseFloat(document.getElementById('minor' + i).value);
    if (name && !isNaN(major) && !isNaN(minor) && major > 0 && minor > 0)
      tools.push({ name, major, minor, color: COLORS[i-1], fill: COLORS_DIM[i-1] });
  }

  document.getElementById('legend').innerHTML = tools.map(t =>
    `<div class="legend-item">
      <div class="legend-line" style="background:${t.color};"></div>
      <span>${t.name} (${t.major}×${t.minor} ${ul})</span>
    </div>`
  ).join('');

  if (tools.length === 0) return;

  const canvas = document.getElementById('eouCanvas');
  const dpr    = Math.min(window.devicePixelRatio || 1, 3);
  const { W, H } = canvasSize(canvas);
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const lp = layoutParams(W);
  const pad = lp.pad;
  const plotW = W - pad.left - pad.right;
  const plotH = H - pad.top  - pad.bottom;
  const cx = pad.left + plotW / 2;
  const cy = pad.top  + plotH / 2;

  const rawMajor = Math.max(...tools.map(t => t.major));
  const rawMinor = Math.max(...tools.map(t => t.minor));

  // One axis range for both X and Y — largest dimension with margin drives both
  const rawMax  = Math.max(rawMajor, rawMinor);
  const step    = niceStep(rawMax * 1.25, 4);
  const axisMax = niceMax(rawMax * 1.25, step);  // same number used for X and Y

  // Fit the square data space into the (possibly non-square) canvas
  // Use the tighter pixel dimension so ellipse never clips
  const scale  = Math.min((plotW / 2) / axisMax, (plotH / 2) / axisMax);
  const scaleX = scale;
  const scaleY = scale;

  const axisX  = axisMax;
  const axisY  = axisMax;
  const stepX  = step;
  const stepY  = step;

  /* Background */
  ctx.fillStyle = cssVar('--canvas-bg');
  ctx.fillRect(0, 0, W, H);

  /* Grid */
  ctx.strokeStyle = cssVar('--grid-line');
  ctx.lineWidth = 0.5;
  for (let v = -axisX; v <= axisX + 0.001; v += stepX) {
    const px = cx + v * scaleX;
    ctx.beginPath(); ctx.moveTo(px, pad.top); ctx.lineTo(px, H - pad.bottom); ctx.stroke();
  }
  for (let v = -axisY; v <= axisY + 0.001; v += stepY) {
    const py = cy - v * scaleY;
    ctx.beginPath(); ctx.moveTo(pad.left, py); ctx.lineTo(W - pad.right, py); ctx.stroke();
  }

  /* Axes */
  ctx.strokeStyle = cssVar('--axis-line');
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(pad.left, cy); ctx.lineTo(W - pad.right, cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx, pad.top); ctx.lineTo(cx, H - pad.bottom); ctx.stroke();

  /* Tick labels */
  ctx.fillStyle = cssVar('--text-sec');
  ctx.font = lp.tickFont;
  ctx.textAlign = 'center';
  ctx.fillText('0', cx, H - pad.bottom + 13);
  for (let v = stepX; v <= axisX + 0.001; v += stepX) {
    ctx.fillText( Math.round(v), cx + v * scaleX, H - pad.bottom + 13);
    ctx.fillText(-Math.round(v), cx - v * scaleX, H - pad.bottom + 13);
  }
  ctx.textAlign = 'right';
  for (let v = stepY; v <= axisY + 0.001; v += stepY) {
    ctx.fillText( Math.round(v), pad.left - 5, cy - v * scaleY + 4);
    ctx.fillText(-Math.round(v), pad.left - 5, cy + v * scaleY + 4);
  }

  /* Ellipses */
  const sorted = [...tools].sort((a, b) => (b.major * b.minor) - (a.major * a.minor));
  for (const t of sorted) {
    ctx.beginPath();
    ctx.ellipse(cx, cy, t.major * scaleX, t.minor * scaleY, 0, 0, 2 * Math.PI);
    ctx.fillStyle = t.fill;
    ctx.fill();
    ctx.strokeStyle = t.color;
    ctx.lineWidth = lp.ellW;
    ctx.stroke();
  }

  /* TD label */
  ctx.fillStyle = cssVar('--td-label');
  ctx.font = 'bold ' + lp.labelFont;
  ctx.textAlign = 'left';
  ctx.fillText(td.toLocaleString() + ' ' + ul, cx + 7, cy - 7);

  /* Center dot */
  ctx.beginPath();
  ctx.arc(cx, cy, lp.dotR, 0, 2 * Math.PI);
  ctx.fillStyle = cssVar('--center-dot');
  ctx.fill();
  ctx.strokeStyle = cssVar('--center-ring');
  ctx.lineWidth = 1.5;
  ctx.stroke();

  /* ± callout above each ellipse */
  for (const t of tools) {
    ctx.fillStyle = t.color;
    ctx.font = lp.tickFont;
    ctx.textAlign = 'center';
    ctx.fillText('±' + t.major + ' ' + ul, cx, cy - t.minor * scaleY - 5);
  }
}

/* ─── Init ──────────────────────────────────────────────── */
window.addEventListener('load', () => setTimeout(drawPlot, 60));
window.addEventListener('resize', drawPlot);

/* Close keyboard and redraw on Done/Enter on mobile */
document.querySelectorAll('input').forEach(el => {
  el.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.target.blur(); drawPlot(); }
  });
});
</script>
</body>
</html>
